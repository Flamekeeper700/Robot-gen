name: Scheduled API Configuration Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger button from GitHub UI

# Explicit environment flag to bypass the deprecation warnings right now
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-assets:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 

      - name: Setup Node.js Environment
        uses: actions/setup-node@v5
        with:
          node-version: '24' 

      - name: Install Dependencies
        run: npm install

      - name: Execute Config Update App
        run: npm run update

      - name: Commit and Push Changes if Updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update universal api definitions [skip ci]"
            git push
          else
            echo "No changes detected in remote APIs. Skipping commit."
          fi