name: Automated API Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly on Sunday at midnight
  workflow_dispatch: # Allows running manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Java JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24' # Set to Node 24 to match the runner environment standard

      - name: Install Dependencies
        run: npm install node-fetch

      - name: Execute Reflection Sync
        run: node update_configs.js

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/definitions.json
          git commit -m "chore: automated hardware definition tracking refresh [skip ci]" || exit 0
          git push