<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboGen - @fekrsnhd</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

    <header>
        <div class="container header-flex">
            <div id="branding">
                <h1>Robo<span>Gen</span></h1>
            </div>
            <nav>
                <ul>
                    <li><button id="btn-tab-general" class="tab-btn active-tab">General</button></li>
                    <li><button id="btn-tab-subsystems" class="tab-btn">Subsystems</button></li>
                    <li><button id="btn-tab-commands" class="tab-btn">Commands</button></li>
                    <li><button id="btn-tab-credits" class="tab-btn">Credits</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="tab-general" class="tab-content">
            <div class="forum-topic-box">
                <div class="forum-topic-header">System Initialization Parameters</div>
                <div class="forum-topic-body">
                    <div class="grid-layout">
                        <div>
                            <label for="cfg-team">FRC Team Identifier</label>
                            <input type="number" id="cfg-team" value="9999">
                        </div>
                        <div>
                            <label for="cfg-logging">Telemetry Framework</label>
                            <select id="cfg-logging">
                                <option value="advantagekit" selected>AdvantageKit Framework</option>
                                <option value="doglog">DogLog Framework</option>
                                <option value="standard">Standard WPILib Engine</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <button id="btn-export" class="action-btn">Build & Build Compilation (.zip)</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-subsystems" class="tab-content hidden">
            <div style="display: flex; justify-content: flex-end;">
                <button id="btn-add-subsystem" class="action-btn">+ Initialize Subsystem</button>
            </div>
            <div id="subsystems-container"></div>
        </section>

        <section id="tab-commands" class="tab-content hidden">
            <div style="display: flex; justify-content: flex-end;">
                <button id="btn-add-command" class="action-btn">+ Instantiate Command</button>
            </div>
            <div id="commands-container"></div>
        </section>

        <section id="tab-credits" class="tab-content hidden">
            <div class="forum-topic-box">
                <div class="forum-topic-header">Credits</div>
                <div class="forum-topic-body">
                    <p><strong>Developed by @fekrsnhd</strong></p>
                    <p style="color: #666; font-size: 13px;">indev</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
